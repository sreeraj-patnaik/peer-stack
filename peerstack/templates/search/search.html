<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search Results</title>
</head>
<body>
    <h2>Skill Search</h2>

<form method="GET">
    <input type="text" name="skill" placeholder="Search skill">
    <button type="submit">Search</button>
</form>

<hr>

{% if results %}
    <h3>Results:</h3>
    {% for item in results %}
        <p>{{ item.user.username }} - {{ item.skill.name }}</p>
    {% endfor %}
{% endif %}
    
</body>
</html>
